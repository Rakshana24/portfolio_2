<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <!-- Text / Border Gradient -->
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="50%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
    <!-- Outer Ring Gradient -->
    <linearGradient id="ring-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="50%" stop-color="#9333ea" />
      <stop offset="100%" stop-color="#db2777" />
    </linearGradient>
  </defs>
  
  <!-- Outer circle border with gradient -->
  <circle cx="16" cy="16" r="15" fill="url(#bg-grad)" stroke="url(#ring-grad)" stroke-width="2" />
  
  <!-- Outer glow ring -->
  <circle cx="16" cy="16" r="13" fill="none" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1" />
  
  <!-- The Bold 'R' -->
  <text x="16" y="22.5" 
        font-family="-apple-system, BlinkMacSystemFont, 'Plus Jakarta Sans', 'Inter', 'Segoe UI', sans-serif" 
        font-weight="900" 
        font-size="19" 
        fill="url(#text-grad)" 
        text-anchor="middle"
        letter-spacing="-0.5">R</text>
</svg>